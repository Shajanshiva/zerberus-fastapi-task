services:
  api:
    build: .
    ports:
      - "8000:8000"
    # depends_on:
    #   - db
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7
    container_name: redis-container
    restart: always
    ports:
      - "6379:6379"

